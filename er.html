<!DOCTYPE html>
<html>
<head>
<title>Emoji Catcher</title>
<style>
body {
  margin:0;
  background:#1a1a2e;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
canvas {
  background:#16213e;
  border:3px solid #0f3460;
  border-radius:12px;
}
#score {
  font-size:28px;
  margin-bottom:12px;
}
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="game" width="400" height="500"></canvas>
<p>← → to move basket | Catch the emojis!</p>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let basket={x:170,y:450,w:60,h:20};
let emojis=['🍎','🍌','🍓','🍕','🍩','⚽','⭐','🎮'];
let falling=[];
let score=0;
let keys={};
let gameOver=false;

document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);

function spawn(){
  if(Math.random()<0.04){
    falling.push({
      x:Math.random()*370,
      y:0,
      emoji:emojis[Math.floor(Math.random()*emojis.length)],
      speed:2+Math.random()*2
    });
  }
}

function update(){
  if(gameOver)return;
  
  if(keys['ArrowLeft']&&basket.x>0)basket.x-=7;
  if(keys['ArrowRight']&&basket.x<340)basket.x+=7;
  
  spawn();
  
  falling.forEach((f,i)=>{
    f.y+=f.speed;
    
    // catch
    if(f.y+basket.h>=basket.y && f.x>basket.x && f.x<basket.x+basket.w){
      score++;
      falling.splice(i,1);
      document.getElementById('score').textContent='Score: '+score;
    }
    
    // miss
    if(f.y>500)falling.splice(i,1);
  });
}

function draw(){
  ctx.clearRect(0,0,400,500);
  
  // basket
  ctx.fillStyle='#e94560';
  ctx.fillRect(basket.x,basket.y,basket.w,basket.h);
  ctx.font='24px Arial';
  ctx.fillText('🧺',basket.x+18,basket.y+18);
  
  // falling emojis
  ctx.font='32px Arial';
  falling.forEach(f=>{
    ctx.fillText(f.emoji,f.x,f.y);
  });
  
  if(!gameOver)requestAnimationFrame(loop);
}

function loop(){
  update();
  draw();
}

loop();
</script>
</body>
</html>
